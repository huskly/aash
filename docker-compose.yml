services:
  dashboard:
    build:
      context: .
      args:
        VITE_NOTIFICATION_API_URL: ${VITE_NOTIFICATION_API_URL:-http://localhost:3001}
    ports:
      - '5173:80'
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - '3001:3001'
    env_file: ./.env
    volumes:
      - monitor-data:/app/packages/server/data
    restart: unless-stopped

volumes:
  monitor-data:
